<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexOS | Retro-Modern WebOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-sleek">
    <div id="boot-screen">
        <div class="cursor"></div>
        <div id="boot-log"></div>
    </div>

    <main id="desktop" class="hidden">
        <nav id="taskbar">
            <div class="start-btn">APEX</div>
            <div id="active-apps"></div>
            <div class="taskbar-status">
                <span id="bat-status"></span>
                <span id="sys-stats"></span>
            </div>
            <div id="clock">00:00:00</div>
            <div id="show-desktop" onclick="wm.showDesktop()" title="Show Desktop"></div>
        </nav>

        <div id="desktop-icons"></div>

        <div id="start-menu" class="hidden">
            <div class="start-menu-search">
                <input type="text" id="start-search" placeholder="Search apps...">
            </div>
            <div id="start-menu-items">
                <div class="start-menu-item" data-app="terminal">Terminal</div>
                <div class="start-menu-item" data-app="browser">ApexBrowser</div>
                <div class="start-menu-item" data-app="explorer">File Explorer</div>
                <div class="start-menu-item" data-app="editor">Text Editor</div>
                <div class="start-menu-item" data-app="notes">Sticky Notes</div>
                <div class="start-menu-item" data-app="calc">Calculator</div>
                <div class="start-menu-item" data-app="clock">Clock & Timer</div>
                <div class="start-menu-item" data-app="sysmon">System Monitor</div>
                <div class="start-menu-item" data-app="settings">Settings</div>
                <div class="start-menu-item" data-app="sysinfo">System Info</div>
                <div class="start-menu-item" data-app="taskmgr">Task Manager</div>
                <div class="start-menu-item" data-app="paint">ApexPaint</div>
                <div class="start-menu-item" data-app="snake">Snake Retro</div>
                <div class="start-menu-item" data-app="weather">Weather</div>
                <div class="start-menu-item" data-app="about">About ApexOS</div>
            </div>
        </div>

        <div id="window-container"></div>
        <div id="context-menu" class="hidden">
            <div class="ctx-item" onclick="Apps.terminal.launch()">Open Terminal</div>
            <div class="ctx-item" onclick="Apps.sysmon.launch()">System Monitor</div>
            <hr style="border:0; border-top:1px solid #333">
            <div class="ctx-item" onclick="System.sortIcons()">Sort Icons</div>
            <div class="ctx-item" onclick="location.reload()">Refresh System</div>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
